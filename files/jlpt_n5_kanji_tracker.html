<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N5 — Kanji Tracker · 8 Weeks</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a1a;
  --ink-soft: #3a3a3a;
  --paper: #f4efe6;
  --paper-soft: #ebe4d6;
  --paper-deep: #e2d9c4;
  --rule: #c9bfa9;
  --rule-soft: #d8cfb9;
  --accent: #8b1a1a;
  --accent-soft: #b85c5c;
  --muted: #6b6357;
  --gold: #b8893d;
  --done: #5a7a3a;
  --done-bg: #d8e0c4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 300;
  line-height: 1.6;
  padding: 50px 32px;
  background-image:
    radial-gradient(circle at 15% 25%, rgba(139, 26, 26, 0.03) 0%, transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(184, 137, 61, 0.04) 0%, transparent 50%);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ====== Masthead ====== */
.masthead {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: end;
  gap: 30px;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 20px;
  margin-bottom: 40px;
}

.masthead-mark {
  font-family: 'Shippori Mincho', serif;
  font-size: 90px;
  font-weight: 700;
  color: var(--accent);
  line-height: 0.85;
  letter-spacing: -4px;
}

.masthead-title h1 {
  font-family: 'Shippori Mincho', serif;
  font-size: 38px;
  font-weight: 500;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 8px;
}

.masthead-title .sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.masthead-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-align: right;
  text-transform: uppercase;
  line-height: 1.8;
}

/* ====== Progress overview ====== */
.progress-bar {
  background: var(--paper-soft);
  border: 1px solid var(--rule);
  padding: 18px 24px;
  margin-bottom: 50px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 30px;
}

.progress-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.progress-track {
  height: 8px;
  background: var(--paper-deep);
  position: relative;
  overflow: hidden;
}

.progress-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--accent);
  width: 0%;
  transition: width 0.4s ease;
}

.progress-stats {
  font-family: 'Shippori Mincho', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  text-align: right;
  white-space: nowrap;
}

.progress-stats .total {
  color: var(--muted);
  font-weight: 400;
  font-size: 18px;
}

/* ====== Week navigation ====== */
.week-nav {
  display: flex;
  gap: 6px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.week-pill {
  flex: 1;
  min-width: 100px;
  padding: 10px 14px;
  background: var(--paper-soft);
  border: 1px solid var(--rule);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  user-select: none;
}

.week-pill:hover {
  background: var(--paper-deep);
  color: var(--ink);
}

.week-pill.complete {
  background: var(--done-bg);
  color: var(--done);
  border-color: var(--done);
}

.week-pill .pill-num {
  font-weight: 500;
  color: var(--accent);
  display: block;
  margin-bottom: 2px;
}

.week-pill.complete .pill-num { color: var(--done); }

/* ====== Week sections ====== */
.week {
  margin-bottom: 60px;
}

.week-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: baseline;
  gap: 20px;
  padding-bottom: 14px;
  margin-bottom: 26px;
  border-bottom: 1px solid var(--rule);
}

.week-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2px;
  font-weight: 500;
}

.week-head h2 {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 500;
}

.week-head .jp {
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  color: var(--muted);
}

.week-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* ====== Kanji card grid ====== */
.day-block {
  margin-bottom: 22px;
}

.day-block:last-child {
  margin-bottom: 0;
}

.day-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px dashed var(--rule);
}

.day-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
}

.day-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

.kanji-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.kanji-card {
  background: var(--paper-soft);
  border: 1px solid var(--rule);
  padding: 16px 18px;
  position: relative;
  cursor: pointer;
  transition: all 0.2s;
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 14px;
  align-items: start;
}

.kanji-card:hover {
  border-color: var(--accent-soft);
  background: var(--paper);
}

.kanji-card.known {
  background: var(--done-bg);
  border-color: var(--done);
}

.kanji-card.known .k-glyph {
  color: var(--done);
}

.k-glyph {
  font-family: 'Shippori Mincho', serif;
  font-size: 56px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
  text-align: center;
  align-self: center;
}

.k-info {
  font-size: 13px;
  line-height: 1.5;
}

.k-meaning {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}

.k-readings {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  line-height: 1.5;
}

.k-readings .on { color: var(--accent); }
.k-readings .kun { color: var(--gold); }

.k-mnemonic {
  font-size: 11px;
  font-style: italic;
  color: var(--ink-soft);
  border-left: 2px solid var(--rule);
  padding-left: 8px;
  margin-bottom: 6px;
  line-height: 1.5;
}

.k-example {
  font-family: 'Shippori Mincho', serif;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}

.k-example ruby rt {
  font-size: 8px;
  color: var(--accent);
}

.k-checkmark {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 16px;
  height: 16px;
  border: 1px solid var(--rule);
  background: var(--paper);
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: transparent;
  transition: all 0.2s;
}

.kanji-card.known .k-checkmark {
  background: var(--done);
  border-color: var(--done);
  color: var(--paper);
}

/* ====== Footer ====== */
footer {
  margin-top: 70px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-align: center;
  line-height: 1.8;
}

footer .reset-btn {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

footer .reset-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ====== Responsive ====== */
@media (max-width: 700px) {
  body { padding: 30px 18px; }
  .masthead { grid-template-columns: 1fr; gap: 16px; }
  .masthead-meta { text-align: left; }
  .progress-bar { grid-template-columns: 1fr; gap: 14px; }
  .progress-stats { text-align: left; }
  .week-pill { flex-basis: calc(50% - 3px); min-width: 0; }
  .kanji-grid { grid-template-columns: 1fr; }
}

/* Print */
@media print {
  body { background: white; padding: 20px; }
  .week-pill, .k-checkmark, footer .reset-btn { display: none; }
  .kanji-card { break-inside: avoid; page-break-inside: avoid; }
  .week { page-break-after: always; }
}
</style>
</head>

<div class="container">

    </div>
    <div class="progress-stats">
      <span id="progressNum">0</span><span class="total"> / 104</span>
    </div>
  </div>

  <!-- Week navigation -->
  <div class="week-nav" id="weekNav"></div>

  <!-- Weeks rendered here -->
  <div id="weeks"></div>

  <footer>
    <div>Click a kanji card to toggle "known" · Progress is saved in your browser</div>
    <button class="reset-btn" onclick="resetProgress()">Reset all progress</button>
  </footer>
</div>

// ============================================================
// Render
// ============================================================
const STORAGE_KEY = "n5_kanji_known";

function loadKnown() {
  try {
    return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
  } catch { return new Set(); }
}

function saveKnown(set) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
}

let known = loadKnown();
const total = weeks.reduce((sum, w) => sum + w.kanji.length, 0);

function renderWeekNav() {
  const nav = document.getElementById("weekNav");
  nav.innerHTML = weeks.map((w, i) => {
    const completed = w.kanji.filter(k => known.has(k.k)).length;
    const isComplete = completed === w.kanji.length;
    return `<div class="week-pill ${isComplete ? 'complete' : ''}" onclick="document.getElementById('week${i}').scrollIntoView({behavior:'smooth'})">
      <span class="pill-num">Week ${i+1}</span>
      ${completed}/${w.kanji.length}
    </div>`;
  }).join("");
}

function renderWeeks() {
  const container = document.getElementById("weeks");
  container.innerHTML = weeks.map((w, wi) => {
    // Split: Monday gets first ~7, Wednesday gets the rest
    // Per the Full Weekly Schedule (companion tool)
    const monCount = Math.ceil(w.kanji.length / 2);
    const monKanji = w.kanji.slice(0, monCount);
    const wedKanji = w.kanji.slice(monCount);
    const renderCard = k => `
      <div class="kanji-card ${known.has(k.k) ? 'known' : ''}" data-kanji="${k.k}" onclick="toggleKnown('${k.k}')">
        <div class="k-checkmark">✓</div>
        <div class="k-glyph">${k.k}</div>
        <div class="k-info">
          <div class="k-meaning">${k.meaning}</div>
          <div class="k-readings">
            <span class="on">音 ${k.on}</span> · <span class="kun">訓 ${k.kun}</span>
          </div>
          <div class="k-mnemonic">${k.mnemonic}</div>
          <div class="k-example">
            <ruby>${k.ex.jp}<rt>${k.ex.read}</rt></ruby> — ${k.ex.en}
          </div>
        </div>
      </div>`;
    return `
    <section class="week" id="week${wi}">
      <div class="week-head">
        <span class="week-num">WEEK ${String(wi+1).padStart(2,'0')}</span>
        <h2>${w.title} <span class="jp" style="font-size:18px;color:var(--muted);margin-left:10px;">${w.titleJp}</span></h2>
        <span class="week-count">${w.kanji.length} kanji · ${w.focus}</span>
      </div>
      <div class="day-block">
        <div class="day-header">
          <span class="day-label">Monday · introduce</span>
          <span class="day-meta">${monKanji.length} kanji · shape + meaning + mnemonic</span>
        </div>
        <div class="kanji-grid">
          ${monKanji.map(renderCard).join("")}
        </div>
      </div>
      <div class="day-block">
        <div class="day-header">
          <span class="day-label">Wednesday · introduce + reinforce</span>
          <span class="day-meta">${wedKanji.length} kanji · drill readings + write Mon's by hand</span>
        </div>
        <div class="kanji-grid">
          ${wedKanji.map(renderCard).join("")}
        </div>
      </div>
    </section>`;
  }).join("");
}

function updateProgress() {
  const count = known.size;
  document.getElementById("progressNum").textContent = count;
  document.getElementById("progressFill").style.width = (count / total * 100) + "%";
}

function toggleKnown(kanji) {
  if (known.has(kanji)) known.delete(kanji);
  else known.add(kanji);
  saveKnown(known);
  // Update only the affected card and stats — no full re-render
  document.querySelectorAll(`[data-kanji="${kanji}"]`).forEach(card => {
    card.classList.toggle("known");
  });
  updateProgress();
  renderWeekNav();
}

function resetProgress() {
  if (confirm("Reset all progress? This cannot be undone.")) {
    known = new Set();
    saveKnown(known);
    renderWeekNav();
    renderWeeks();
    updateProgress();
  }
}

// Initial render
renderWeekNav();
renderWeeks();
updateProgress();
</script>
